<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creatine Products</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

.navbar {
    background: #111;
    padding: 15px;
    font-size: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    padding: 15px;
}

.product-card {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.product-card:hover {
    transform: scale(1.05);
}

.product-card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    border-radius: 10px;
}

.product-detail {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    margin: 20px auto;
}

.product-detail img {
    width: 100%;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 5px;
    border: none;
}

button {
    background: #ff6600;
    border: none;
    padding: 10px;
    color: white;
    margin: 8px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #00c853;
}

.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 22px;
    color: white;
    background: #111;
    padding: 10px 14px;
    border-radius: 50%;
    text-decoration: none;
}

/* ===== CART ===== */
.cart-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: orange;
    color: black;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    z-index: 999;
}

.cart-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 260px;
    background: #222;
    padding: 15px;
    border-radius: 10px;
    display: none;
    z-index: 999;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.remove-btn {
    background: red;
    border: none;
    color: white;
    padding: 2px 6px;
    cursor: pointer;
}

/* TOAST */
#toast {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: green;
    padding: 10px;
    border-radius: 5px;
    opacity: 0;
    transition: 0.3s;
    z-index: 999;
}
</style>
</head>

<body>

<nav class="navbar">
<a href="products.html" class="back-btn">⬅</a>
<h2>Creatine</h2>
</nav>

<div id="grid" class="grid"></div>

<div id="detail" class="product-detail" style="display:none;">
<img id="pimg">
<h3 id="pname"></h3>
<p id="pprice"></p>
<ul id="pdesc"></ul>

<!-- ADDED -->
<button onclick="addToCart()">Add to Cart</button>

<button onclick="showOrder()">Order</button>
<button onclick="backToGrid()">⬅ Back</button>
</div>

<div id="order" class="product-detail" style="display:none;">
<h3>Order Form</h3>
<img id="oimg">
<h4 id="oname"></h4>
<p id="oprice"></p>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<button onclick="orderNow()">Submit</button>
<button onclick="backToDetail()">⬅ Back</button>
</div>

<!-- CART UI -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart-box" id="cartBox">
<h3>Cart</h3>
<div id="cartItems"></div>
<h4>Total: ₹<span id="total">0</span></h4>
</div>

<div id="toast"></div>

<script>
const products = [
{ name: "Creatine 1", price: 1000, img: "img/creatine1.jpg", desc: ["Supports strength","Muscle energy","Quality"] },
{ name: "Creatine 2", price: 1100, img: "img/creatine2.jpg", desc: ["Improves performance","Boosts power","Fast absorption"] },
{ name: "Creatine 3", price: 1200, img: "img/creatine3.jpg", desc: ["Muscle recovery","Strength","Premium"] },
{ name: "Creatine 4", price: 1300, img: "img/creatine4.jpg", desc: ["Energy boost","Muscle support","Tasty"] },
{ name: "Creatine 5", price: 1400, img: "img/creatine5.jpg", desc: ["High quality","Endurance","Strength"] }
];

const grid = document.getElementById("grid");

products.forEach((p,i)=>{
const div=document.createElement("div");
div.className="product-card";
div.innerHTML=`<img src="${p.img}"><h4>${p.name}</h4><p>₹${p.price}</p>`;
div.onclick=()=>showDetail(i);
grid.appendChild(div);
});

let currentProduct=null;
let cart=[];

function showDetail(i){
currentProduct=products[i];

pimg.src=currentProduct.img;
pname.innerText=currentProduct.name;
pprice.innerText="₹"+currentProduct.price;

pdesc.innerHTML="";
currentProduct.desc.forEach(d=>{
let li=document.createElement("li");
li.innerText=d;
pdesc.appendChild(li);
});

grid.style.display="none";
detail.style.display="block";
}

function backToGrid(){
detail.style.display="none";
grid.style.display="grid";
}

function showOrder(){
oimg.src=currentProduct.img;
oname.innerText=currentProduct.name;
oprice.innerText="₹"+currentProduct.price;

detail.style.display="none";
order.style.display="block";
}

function backToDetail(){
order.style.display="none";
detail.style.display="block";
}

function orderNow(){
const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();
const email=document.getElementById("email").value.trim();

if(!name||!phone||!email){
alert("Please fill all fields!");
return;
}

const msg=`Order:%0AProduct: ${currentProduct.name}%0APrice: ₹${currentProduct.price}%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}`;
window.open(`https://api.whatsapp.com/send?phone=917339563621&text=${msg}`,"_blank");
}

/* CART */
function addToCart(){
cart.push(currentProduct);
renderCart();
showToast(currentProduct.name);
}

function renderCart(){
let total=0;
cartItems.innerHTML="";
cart.forEach((item,i)=>{
total+=item.price;
cartItems.innerHTML+=`
<div class="cart-item">
${item.name} ₹${item.price}
<button class="remove-btn" onclick="removeItem(${i})">X</button>
</div>`;
});
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function toggleCart(){
cartBox.style.display=cartBox.style.display==="block"?"none":"block";
}

function showToast(name){
toast.innerText=name+" added 🛒";
toast.style.opacity="1";
setTimeout(()=>toast.style.opacity="0",2000);
}
</script>

</body>
</html>
